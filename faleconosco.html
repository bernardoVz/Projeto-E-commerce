<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fugaz+One&family=Titan+One&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="ecommerce.css" />
    <title>Fale Conosco - E-Music Store</title>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const form = document.querySelector(".formulario");

        form.addEventListener("submit", function (event) {
          event.preventDefault(); // evita envio automático

          const nome = document.querySelector("#nome").value.trim();
          const email = document.querySelector("#email").value.trim();
          const nascimento = document.querySelector("#nascimento").value.trim();
          const mensagem = document.querySelector("#mensagem").value.trim();
          const assuntoSelecionado = document.querySelector(
            'input[name="assunto"]:checked'
          );

          if (
            !nome ||
            !email ||
            !nascimento ||
            !mensagem ||
            !assuntoSelecionado
          ) {
            alert("Por favor, preencha todos os campos antes de enviar.");
            return;
          }

          alert("Mensagem enviada com sucesso! Obrigado pelo contato 😊");
          form.reset(); // limpa o formulário após o envio
        });
      });
    </script>
  </head>
  <body>
    <section>
      <div class="cabecalho-nav">
        <img class="img-produtos" src="./vinyl_PNG63.png" alt="" />
        <h1 style="padding-left: 1rem">E-Music Store</h1>
      </div>
      <header>
        <nav>
          <ul class="menunav" style="gap: 2rem">
            <li><a href="./index.php">Página Inicial</a></li>
            <li><a href="./produtos.php">Produtos</a></li>
            <li><a href="./carrinho.php">Carrinho</a></li>
            <li><a href="./faleconosco.html">Fale Conosco</a></li>
          </ul>
        </nav>
      </header>
    </section>

    <main>
      <h2>Fale Conosco</h2>
      <section>
        <form class="formulario">
          <label for="nome">Nome:</label>
          <input type="text" id="nome" name="nome" placeholder="Seu nome" />

          <label for="email">Email:</label>
          <input type="email" id="email" name="email" placeholder="Seu email" />

          <label for="nascimento">Data de Nascimento:</label>
          <input type="date" id="nascimento" name="nascimento" />

          <div>
            <label>Assunto:</label>
            <div class="opcoes-radio">
              <label
                ><input type="radio" name="assunto" value="duvida" />
                Dúvida</label
              >
              <label
                ><input type="radio" name="assunto" value="sugestao" />
                Sugestão</label
              >
              <label
                ><input type="radio" name="assunto" value="reclamacao" />
                Reclamação</label
              >
            </div>
          </div>

          <label for="mensagem">Mensagem:</label>
          <textarea
            id="mensagem"
            name="mensagem"
            rows="4"
            placeholder="Escreva sua mensagem..."
          ></textarea>

          <div style="justify-content: start; gap: 1rem">
            <label>Desejo receber novidades por email </label
            ><input type="checkbox" name="novidades" />
          </div>

          <button type="submit" class="btn-enviar">Enviar</button>
        </form>
      </section>
    </main>

    <footer>
      <div>
        <p>Desenvolvedor: Arthur Coutinho</p>
        <p>Telefone: (31) 91234-5678</p>
        <p>Email: arthur.coutinho@gmail.com</p>
      </div>
    </footer>
  </body>
</html>
